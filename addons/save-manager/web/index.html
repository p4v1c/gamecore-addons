<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameCore — Save Manager</title>
<link rel="stylesheet" href="gamecore-nav.css">
<script src="gamecore-nav.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d12; --surface:#13161e; --surface2:#1c202c; --surface3:#252a38;
  --border:rgba(255,255,255,0.07); --text:#dde1ed; --text2:#7d8499;
  --accent:#22c55e; --danger:#f04040; --warn:#fbbf24; --radius:10px;
  --sidebar-w:270px; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;font-size:14px}
body.gc-nav-present #sidebar, body.gc-nav-present #main{height:calc(100vh - 44px)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:22px 20px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:#fff}
.sidebar-logo svg{color:var(--accent)}
.sidebar-sub{margin-top:4px;font-size:11px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.emu-list{flex:1;overflow-y:auto;padding:8px 0}
.emu-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-left:3px solid transparent;user-select:none}
.emu-item:hover{background:var(--surface2)}
.emu-item.active{background:var(--surface2);border-left-color:var(--accent)}
.emu-item.disabled{opacity:.35;cursor:default}
.emu-item.active .emu-name{color:#fff}
.emu-name{font-weight:500;font-size:13px}
.emu-counts{font-size:11px;color:var(--text2);margin-top:1px}

#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.top-bar{display:flex;align-items:center;gap:14px;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface)}
.top-title{font-size:18px;font-weight:700;color:#fff}
.top-meta{font-size:12px;color:var(--text2)}
.content{flex:1;overflow-y:auto;padding:22px 28px}

.section-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);
  margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-title:first-child{margin-top:0}

/* game rows */
.game{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.game-head{display:flex;align-items:center;gap:14px;padding:12px 15px;cursor:pointer;user-select:none}
.game-head:hover{background:var(--surface2)}
.game-cover{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--surface3);flex-shrink:0}
.game-cover.ph{display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text2)}
.game-info{flex:1;min-width:0}
.game-name{font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-sub{font-size:11px;color:var(--text2);margin-top:2px}
.chev{color:var(--text2);font-size:18px;transition:transform .15s}
.game.open .chev{transform:rotate(90deg)}
.game-files{border-top:1px solid var(--border);padding:6px 12px 12px;display:none}
.game.open .game-files{display:block}

.file{display:flex;align-items:center;gap:12px;padding:9px 6px;border-bottom:1px solid rgba(255,255,255,0.04)}
.file:last-child{border-bottom:none}
.f-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.f-body{flex:1;min-width:0}
.f-name{font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.f-meta{font-size:10.5px;color:var(--text2);margin-top:1px}
.kind-state .f-name::after{content:" · save state";color:var(--warn);font-size:10px}
.f-actions{display:flex;gap:6px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:7px;border:none;cursor:pointer;font-size:11.5px;font-weight:600;font-family:var(--font)}
.btn:active{transform:scale(.96)}
.btn-dl{background:rgba(34,197,94,.13);color:var(--accent);border:1px solid rgba(34,197,94,.3)}
.btn-dl:hover{background:rgba(34,197,94,.2)}
.btn-del{background:transparent;color:var(--danger);border:1px solid rgba(240,64,64,.35)}
.btn-del:hover{background:var(--danger);color:#fff}

.note{font-size:12px;color:var(--text2);background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);
  border-radius:8px;padding:10px 13px;margin-bottom:12px;line-height:1.5}
.restore{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:6px}
.drop-zone{flex:1;min-width:220px;border:2px dashed var(--border);border-radius:var(--radius);padding:12px;text-align:center;
  color:var(--text2);cursor:pointer;transition:.2s;font-size:12px}
.drop-zone:hover,.drop-zone.hover{border-color:var(--accent);background:rgba(34,197,94,.05);color:var(--text)}
.drop-zone b{color:var(--text);font-weight:600}
.drop-zone input{display:none}

.empty{padding:18px;text-align:center;color:var(--text2);font-size:13px}
.spinner{width:30px;height:30px;border:3px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:50px auto}
@keyframes spin{to{transform:rotate(360deg)}}
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text2);text-align:center}
#welcome h2{font-size:22px;color:var(--text);font-weight:700}
#welcome p{font-size:14px;max-width:400px;line-height:1.7}
#toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:200;width:340px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);
  padding:12px 14px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideIn .2s ease}
.toast.error{border-left-color:var(--danger)}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      Save Manager
    </div>
    <div class="sidebar-sub" id="sidebar-sub">Loading…</div>
  </div>
  <div class="emu-list" id="emu-list"><div class="spinner"></div></div>
</aside>

<main id="main">
  <div class="top-bar" id="top-bar" style="display:none">
    <span class="top-title" id="top-title"></span>
    <span class="top-meta" id="top-meta"></span>
  </div>
  <div class="content" id="content">
    <div id="welcome">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".3">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      <h2>Save Manager</h2>
      <p>Pick a system on the left. Your games appear with their box art —
         click a game to see and manage the save files that make it up.</p>
    </div>
  </div>
</main>
<div id="toasts"></div>

<script>
let emulators = [], active = null, data = null, openKeys = new Set();
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(m, err){const e=document.createElement('div');e.className='toast'+(err?' error':'');e.textContent=m;$('toasts').appendChild(e);setTimeout(()=>e.remove(),err?6000:3500)}
async function jget(u){const r=await fetch(u);if(!r.ok)throw new Error((await r.json().catch(()=>({}))).detail||r.status);return r.json()}

async function loadEmulators() {
  try { emulators = await jget('/api/emulators'); }
  catch (e) { $('emu-list').innerHTML = `<div class="empty">⚠ ${esc(e.message)}</div>`; return; }
  const avail = emulators.filter(e => e.available).length;
  $('sidebar-sub').textContent = `${avail} systems`;
  $('emu-list').innerHTML = emulators.map(e => `
    <div class="emu-item ${e.available ? '' : 'disabled'}" ${e.available ? `onclick="selectEmu('${e.id}')"` : ''} id="emu-${e.id}">
      <div>
        <div class="emu-name">${esc(e.label)}</div>
        <div class="emu-counts">${e.available ? `${e.games} game${e.games!==1?'s':''} · ${e.entries} file${e.entries!==1?'s':''}` : 'no data'}</div>
      </div>
    </div>`).join('');
}

async function selectEmu(id) {
  active = id; openKeys = new Set();
  document.querySelectorAll('.emu-item').forEach(el => el.classList.remove('active'));
  $(`emu-${id}`).classList.add('active');
  $('top-bar').style.display = '';
  $('top-title').textContent = emulators.find(e => e.id === id).label;
  await load();
}

async function load() {
  $('content').innerHTML = '<div class="spinner"></div>';
  try { data = await jget(`/api/games/${active}`); }
  catch (e) { $('content').innerHTML = `<div class="empty">⚠ ${esc(e.message)}</div>`; return; }
  $('top-meta').textContent = data.base || '';
  render();
}

function fileHTML(e) {
  const icon = e.in_card ? '🎴' : e.is_dir ? '📁' : e.shared_card ? '🗃️' : e.kind === 'state' ? '⏺' : '💾';
  // Saves read out of a shared card can't be acted on individually — the file
  // on disk is the whole card. Show the size and point downloads at the card.
  const meta = e.in_card
    ? `${e.sizeHuman} · inside ${esc(e.in_card)} — back up the card to keep it`
    : `${e.sizeHuman}${e.is_dir ? ' · folder → .zip' : ''}`;
  let actions;
  if (e.in_card) {
    actions = `<button class="btn btn-dl" onclick="dlSave('${esc(e.id)}','${esc(e.save_key)}')" title="Export just this game's save (.mcs / .psu)">⬇ save</button>`;
  } else if (e.shared_card) {
    // whole-card download + inject one game's save into this card
    const ci = e.id.split('/')[0];
    actions = `<button class="btn btn-dl" onclick="dl('${esc(e.id)}')" title="Download the whole card">⬇</button>
       <label class="btn btn-dl" title="Add one game's .mcs/.psu save into this card">➕ save
         <input type="file" accept=".mcs,.mcr,.psx,.psu,.gci" style="display:none"
                onchange="inject(this.files[0], ${ci}, '${esc(e.name)}');this.value=''"></label>`;
  } else {
    actions = `<button class="btn btn-dl" onclick="dl('${esc(e.id)}')">⬇</button>
       <button class="btn btn-del" onclick="del('${esc(e.id)}','${esc(e.name)}')">✕</button>`;
  }
  return `
    <div class="file ${e.kind === 'state' ? 'kind-state' : ''}">
      <div class="f-icon">${icon}</div>
      <div class="f-body">
        <div class="f-name">${esc(e.name)}</div>
        <div class="f-meta">${meta}</div>
      </div>
      <div class="f-actions">${actions}</div>
    </div>`;
}

function gameHTML(g) {
  const open = openKeys.has(g.key);
  const cover = g.icon
    ? `<img class="game-cover" src="${g.icon}" loading="lazy" onerror="this.classList.add('ph');this.removeAttribute('src');this.textContent='🎮'">`
    : `<div class="game-cover ph">🎮</div>`;
  return `
    <div class="game ${open ? 'open' : ''}">
      <div class="game-head" onclick="toggle('${esc(g.key)}')">
        ${cover}
        <div class="game-info">
          <div class="game-name" title="${esc(g.title)}">${esc(g.title)}</div>
          <div class="game-sub">${g.saves} save${g.saves!==1?'s':''}${g.states?` · ${g.states} state${g.states!==1?'s':''}`:''} · ${g.sizeHuman}</div>
        </div>
        <div class="chev">›</div>
      </div>
      <div class="game-files">${g.entries.map(fileHTML).join('')}</div>
    </div>`;
}

function render() {
  // one drop zone per distinct (kind, mode) — e.g. Dolphin has folder saves
  // (Wii) AND memory-card files (GC)
  const seen = new Set();
  const zones = data.collections.filter(c => {
    const k = c.kind + '/' + c.mode;
    return seen.has(k) ? false : (seen.add(k), true);
  });
  let html = '';

  // Restore
  html += `<div class="section-title">Restore</div>`;
  html += `<div class="restore">${zones.map(c => dz(c, c.kind)).join('')}</div>`;

  // Games
  html += `<div class="section-title">Games — ${data.games.length}</div>`;
  html += data.games.length ? data.games.map(gameHTML).join('')
    : '<div class="empty">No game save detected.</div>';

  // Shared & system files
  if (data.other.length) {
    html += `<div class="section-title">Shared & system files</div>`;
    html += `<div class="note">These aren't tied to a single game but are <b>required for saves to work</b>:
      shared memory cards (PS1/PS2/GameCube hold every game's save) and system data.
      Back them up too — without the card, no save loads.</div>`;
    html += `<div class="game open"><div class="game-files" style="display:block;border:1px solid var(--border);border-radius:var(--radius)">
      ${data.other.map(fileHTML).join('')}</div></div>`;
  }
  $('content').innerHTML = html;
}

function dz(col, kind) {
  const warn = kind === 'state' ? ' <b>Version-specific</b> — only restore on the same emulator build.' : '';
  return `
    <label class="drop-zone" ondragover="event.preventDefault();this.classList.add('hover')"
           ondragleave="this.classList.remove('hover')" ondrop="dropUp(event,${col.index})">
      <b>⬆ Restore a ${kind === 'state' ? 'save state' : 'save'}</b><br>${esc(col.hint)}.${warn}<br>
      <span style="opacity:.7">A backup is kept before overwriting.</span>
      <input type="file" ${col.mode === 'dirs' ? 'accept=".zip"' : ''} onchange="up(this.files[0],${col.index});this.value=''">
    </label>`;
}

function toggle(key){ openKeys.has(key)?openKeys.delete(key):openKeys.add(key); render(); }
function dl(id){ window.location = `/api/saves/${active}/download?id=${encodeURIComponent(id)}`; }
function dlSave(id, serial){ window.location = `/api/saves/${active}/download?id=${encodeURIComponent(id)}&save=${encodeURIComponent(serial)}`; }

async function inject(file, col, cardName) {
  if (!file) return;
  const form = new FormData(); form.append('file', file);
  try {
    const r = await fetch(`/api/saves/${active}/upload?collection=${col}&card=${encodeURIComponent(cardName)}`, { method: 'POST', body: form });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.detail || r.status);
    toast(`Added to ${cardName}: ${d.restored.join(', ')} (card backed up)`); load(); loadEmulators();
  } catch (e) { toast(`Add failed: ${e.message}`, true); }
}

async function del(id, name) {
  if (!confirm(`Delete "${name}"?\nA backup is kept next to it, but the game won't see this save anymore.`)) return;
  try {
    const r = await fetch(`/api/saves/${active}?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.status);
    toast(`Deleted (backup kept): ${name}`); load(); loadEmulators();
  } catch (e) { toast(`Delete failed: ${e.message}`, true); }
}
function dropUp(ev, col){ ev.preventDefault(); ev.currentTarget.classList.remove('hover'); const f=ev.dataTransfer.files[0]; if(f) up(f,col); }
async function up(file, col) {
  if (!file) return;
  const form = new FormData(); form.append('file', file);
  try {
    const r = await fetch(`/api/saves/${active}/upload?collection=${col}`, { method: 'POST', body: form });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.detail || r.status);
    toast(`Restored: ${d.restored.join(', ')} (backup kept)`); load(); loadEmulators();
  } catch (e) { toast(`Restore failed: ${e.message}`, true); }
}

(function(){ loadEmulators().then(()=>{ const q=new URLSearchParams(location.search).get('emu'); if(q) selectEmu(q); }); })();
</script>
</body>
</html>
