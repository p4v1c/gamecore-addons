<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameCore — Save Manager</title>
<link rel="stylesheet" href="gamecore-nav.css">
<script src="gamecore-nav.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d12; --surface:#13161e; --surface2:#1c202c; --surface3:#252a38;
  --border:rgba(255,255,255,0.07); --text:#dde1ed; --text2:#7d8499;
  --accent:#22c55e; --danger:#f04040; --warn:#fbbf24; --radius:10px;
  --sidebar-w:270px; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;font-size:14px}
body.gc-nav-present #sidebar, body.gc-nav-present #main{height:calc(100vh - 44px)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:22px 20px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:#fff}
.sidebar-logo svg{color:var(--accent)}
.sidebar-sub{margin-top:4px;font-size:11px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.emu-list{flex:1;overflow-y:auto;padding:8px 0}
.emu-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-left:3px solid transparent;user-select:none}
.emu-item:hover{background:var(--surface2)}
.emu-item.active{background:var(--surface2);border-left-color:var(--accent)}
.emu-item.disabled{opacity:.35;cursor:default}
.emu-item.active .emu-name{color:#fff}
.emu-info{flex:1;min-width:0}
.emu-name{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emu-counts{font-size:11px;color:var(--text2);margin-top:1px}

#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.top-bar{display:flex;align-items:center;gap:14px;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface)}
.top-title{font-size:18px;font-weight:700;color:#fff}
.top-meta{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.content{flex:1;overflow-y:auto;padding:24px 28px}

.section-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);
  margin:22px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.section-title:first-child{margin-top:0}
.warn-pill{font-size:10px;font-weight:700;color:var(--warn);background:rgba(251,191,36,.1);padding:2px 8px;border-radius:10px;text-transform:none;letter-spacing:0}

.entry{display:flex;align-items:center;gap:14px;padding:12px 15px;border-radius:var(--radius);
  background:var(--surface);border:1px solid var(--border);margin-bottom:8px}
.e-icon{font-size:18px;flex-shrink:0;width:22px;text-align:center}
.e-body{flex:1;min-width:0}
.e-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.e-meta{font-size:11px;color:var(--text2);margin-top:2px}
.e-actions{display:flex;gap:8px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;border:none;cursor:pointer;
  font-size:12px;font-weight:600;font-family:var(--font);transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.96)}
.btn-dl{background:rgba(34,197,94,.13);color:var(--accent);border:1px solid rgba(34,197,94,.3)}
.btn-dl:hover{background:rgba(34,197,94,.2)}
.btn-del{background:transparent;color:var(--danger);border:1px solid rgba(240,64,64,.35)}
.btn-del:hover{background:var(--danger);color:#fff}

.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;color:var(--text2);
  cursor:pointer;transition:.2s;display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.drop-zone:hover,.drop-zone.hover{border-color:var(--accent);background:rgba(34,197,94,.05);color:var(--text)}
.drop-zone input{display:none}
.drop-zone .dz-hint{font-size:11px;color:var(--text2)}

.empty{padding:20px;text-align:center;color:var(--text2);font-size:13px}
.spinner{width:30px;height:30px;border:3px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:50px auto}
@keyframes spin{to{transform:rotate(360deg)}}
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text2);text-align:center}
#welcome h2{font-size:22px;color:var(--text);font-weight:700}
#welcome p{font-size:14px;max-width:380px;line-height:1.7}
#toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:200;width:340px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);
  padding:12px 14px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideIn .2s ease}
.toast.error{border-left-color:var(--danger)}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      Save Manager
    </div>
    <div class="sidebar-sub" id="sidebar-sub">Loading…</div>
  </div>
  <div class="emu-list" id="emu-list"><div class="spinner"></div></div>
</aside>

<main id="main">
  <div class="top-bar" id="top-bar" style="display:none">
    <span class="top-title" id="top-title"></span>
    <span class="top-meta" id="top-meta"></span>
  </div>
  <div class="content" id="content">
    <div id="welcome">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".3">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      <h2>Save Manager</h2>
      <p>Back up, restore or delete your emulator saves and save states from here —
         no need to open the desktop. Pick a system on the left.</p>
    </div>
  </div>
</main>

<div id="toasts"></div>

<script>
let emulators = [], active = null;
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(m, err){const e=document.createElement('div');e.className='toast'+(err?' error':'');e.textContent=m;$('toasts').appendChild(e);setTimeout(()=>e.remove(),err?6000:3500)}
async function jget(u){const r=await fetch(u);if(!r.ok)throw new Error((await r.json().catch(()=>({}))).detail||r.status);return r.json()}

async function loadEmulators() {
  try { emulators = await jget('/api/emulators'); }
  catch (e) { $('emu-list').innerHTML = `<div class="empty">⚠ ${esc(e.message)}</div>`; return; }
  const avail = emulators.filter(e => e.available).length;
  $('sidebar-sub').textContent = `${avail} systems with saves`;
  $('emu-list').innerHTML = emulators.map(e => `
    <div class="emu-item ${e.available ? '' : 'disabled'}" ${e.available ? `onclick="selectEmu('${e.id}')"` : ''} id="emu-${e.id}">
      <div class="emu-info">
        <div class="emu-name">${esc(e.label)}</div>
        <div class="emu-counts">${e.available ? `${e.saves} save${e.saves!==1?'s':''} · ${e.states} state${e.states!==1?'s':''}` : 'no data'}</div>
      </div>
    </div>`).join('');
  // deep link: ?emu=rpcs3
  const q = new URLSearchParams(location.search).get('emu');
  if (q && !active && emulators.some(e => e.id === q && e.available)) selectEmu(q);
}

async function selectEmu(id) {
  active = id;
  document.querySelectorAll('.emu-item').forEach(el => el.classList.remove('active'));
  $(`emu-${id}`).classList.add('active');
  const meta = emulators.find(e => e.id === id);
  $('top-bar').style.display = '';
  $('top-title').textContent = meta.label;
  await loadSaves();
}

async function loadSaves() {
  $('content').innerHTML = '<div class="spinner"></div>';
  let data;
  try { data = await jget(`/api/saves/${active}`); }
  catch (e) { $('content').innerHTML = `<div class="empty">⚠ ${esc(e.message)}</div>`; return; }
  window._data = data;
  $('top-meta').textContent = data.base || '';

  const saves = data.entries.filter(e => e.kind === 'save');
  const states = data.entries.filter(e => e.kind === 'state');
  const saveCol = data.collections.find(c => c.kind === 'save');
  const stateCol = data.collections.find(c => c.kind === 'state');

  let html = '';
  // ── Saves (portable) ──
  html += `<div class="section-title">💾 Saves <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text2)">— portable, safe to move</span></div>`;
  if (saveCol) html += uploadZone(saveCol, 'save');
  html += saves.length ? saves.map(entryHTML).join('') : '<div class="empty">No save yet.</div>';

  // ── Save states (version-specific) ──
  html += `<div class="section-title">⏺ Save states <span class="warn-pill">⚠ tied to the emulator version — restore only on the same build</span></div>`;
  if (stateCol) html += uploadZone(stateCol, 'state');
  html += states.length ? states.map(entryHTML).join('') : '<div class="empty">No save state.</div>';

  $('content').innerHTML = html;
}

function entryHTML(e) {
  const icon = e.is_dir ? '📁' : e.shared_card ? '🗃️' : '💾';
  return `
    <div class="entry">
      <div class="e-icon">${icon}</div>
      <div class="e-body">
        <div class="e-name" title="${esc(e.name)}">${esc(e.name)}</div>
        <div class="e-meta">${e.sizeHuman}${e.shared_card ? ' · shared memory card (all games)' : e.is_dir ? ' · folder → downloads as .zip' : ''}</div>
      </div>
      <div class="e-actions">
        <button class="btn btn-dl" onclick="dl('${esc(e.id)}')">⬇ Download</button>
        <button class="btn btn-del" onclick="del('${esc(e.id)}','${esc(e.name)}')">✕</button>
      </div>
    </div>`;
}

function uploadZone(col, kind) {
  const warn = kind === 'state' ? ' A restored state only works on the same emulator version.' : '';
  return `
    <label class="drop-zone" ondragover="event.preventDefault();this.classList.add('hover')"
           ondragleave="this.classList.remove('hover')" ondrop="dropUp(event,${col.index})">
      <span style="font-size:13px;font-weight:600">⬆ Restore a ${kind === 'state' ? 'save state' : 'save'}</span>
      <span class="dz-hint">${esc(col.hint)}.${warn} A backup is kept before overwriting.</span>
      <input type="file" ${col.mode === 'dirs' ? 'accept=".zip"' : ''} onchange="up(this.files[0],${col.index});this.value=''">
    </label>`;
}

function dl(id) {
  window.location = `/api/saves/${active}/download?id=${encodeURIComponent(id)}`;
}

async function del(id, name) {
  if (!confirm(`Delete "${name}"?\nA backup is kept next to it, but the game won't see this save anymore.`)) return;
  try {
    const r = await fetch(`/api/saves/${active}?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.status);
    toast(`Deleted (backup kept): ${name}`);
    loadSaves(); loadEmulators();
  } catch (e) { toast(`Delete failed: ${e.message}`, true); }
}

function dropUp(ev, col) { ev.preventDefault(); ev.currentTarget.classList.remove('hover'); const f = ev.dataTransfer.files[0]; if (f) up(f, col); }

async function up(file, col) {
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  try {
    const r = await fetch(`/api/saves/${active}/upload?collection=${col}`, { method: 'POST', body: form });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.detail || r.status);
    toast(`Restored: ${d.restored.join(', ')} (backup kept)`);
    loadSaves(); loadEmulators();
  } catch (e) { toast(`Restore failed: ${e.message}`, true); }
}

loadEmulators();
</script>
</body>
</html>
